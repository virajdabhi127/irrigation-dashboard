<!DOCTYPE html>
<html>
<head>
  <title>ESP32 MQTT Control</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="body">
  <div class="head">
    <div class="header">
      <div class="head1"><h1 id="title">HELLO FARMER</h1></div>
      <div class="lang">
        <select id="languageSelect" onchange="changeLanguage()">
          <option value="en">English</option>
          <option value="hi">हिन्दी</option>
          <option value="gu">ગુજરાતી</option>
          <option value="mr">मराठी</option>
          <option value="bn">বাংলা</option>
        </select>
      </div>
    </div>
    <div class="radio-group">
      <span id="modeLabel">Mode :</span>
      <label>
        <input type="radio" name="mode" id="auto" value="AUTO">
          <span id="autoText">Auto</span>
      </label>
      <label>
        <input type="radio" name="mode" id="manual" value="MANUAL">
          <span id="manualText">Manual</span>
      </label>
    </div>
    <div id="options" class="options">
      <div class="crops"><label for="crops" id="cropLabel">Choose a crop:</label>
        <select id="crop" class="crop">
          <option value="" disabled selected></option>
          <option value="Groundnut">Groundnut</option>
          <option value="Cotton">Cotton</option>
          <option value="Wheat">Wheat</option>
          <option value="Bajra">Bajra</option>
          <option value="Rice">Rice</option>
          <option value="Castor">Castor</option>
          <option value="Mustard">Mustard</option>
          <option value="Cumin">Cumin</option>
          <option value="Sugarcane">Sugarcane</option>
        </select>
        </div>
      <div class="time">
        <label for="time" id="timeLabel">Set time :</label>
        <select id="time" class="time">
          <option value="" disabled selected></option>
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
          <option value="75">75 min</option>
          <option value="90">90 min</option>
          <option value="105">105 min</option>
          <option value="120">120 min</option>
          <option value="135">135 min</option>
          <option value="150">150 min</option>
          <option value="165">165 min</option>
          <option value="180">180 min</option>
        </select>
      </div>
      <div class="days">
        <label for="days" id="daysLabel">Set interval :</label>
        <select id="days" class="days">
          <option value="" disabled selected></option>
          <option value="1">1 Day</option>
          <option value="2">2 Days</option>
          <option value="3">3 Days</option>
           <option value="4">4 Days</option>
          <option value="5">5 Days</option>
          <option value="6">6 Days</option>
           <option value="7">7 Days</option>
          <option value="8">8 Days</option>
          <option value="9">9 Days</option>
           <option value="10">10 Days</option>
          <option value="11">11 Days</option>
          <option value="12">12 Days</option>
           <option value="13">13 Days</option>
          <option value="14">14 Days</option>
          <option value="15">15 Days</option>
           <option value="16">16 Days</option>
          <option value="17">17 Days</option>
          <option value="18">18 Days</option>
           <option value="19">19 Days</option>
          <option value="20">20 Days</option>
        </select>
      </div>
    </div>
    <div class="radio-group">
      <span id="pumpLabel">Pump :</span>
      <label>
        <input type="radio" name="pump" value="ON">
        <span id="onText">ON</span>
      </label>
      <label>
        <input type="radio" name="pump" value="OFF">
        <span id="offText">OFF</span>
    </label>
    </div>
    <div class="btn01">
      <button class="btn1" id="confirmBtn" onclick="sendCrop()">Confirm</button>
    </div>
    <div class="btn02">
      <button class="btn2" value = "stop" id="stopBtn" onclick="stop()">EMERGENCY STOP</button>
    </div> 
  </div> 
  
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="script.js"></script>
 
   </body>
</html>
